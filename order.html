<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Online — AD's Kitchen</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #C62828; --red-d: #8E0000; --red-l: #EF5350;
      --gold: #FBC02D; --gold-d: #F9A825;
      --dark: #1A1208; --dark2: #221A0A; --dark3: #2E2416;
      --green: #2E7D32; --white: #FFFFFF; --off: #FFF8EE;
      --muted: #9a8f7d;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      padding-bottom: 140px;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--dark2), var(--dark3));
      border-bottom: 2px solid var(--gold);
      padding: 1rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(12px);
    }
    header .brand { display: flex; align-items: center; gap: 0.75rem; }
    header .brand img { height: 42px; }
    header .brand-text { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1.2rem; color: var(--gold); }
    header a.back { color: var(--white); text-decoration: none; font-size: 0.9rem; opacity: 0.85; }
    header a.back:hover { color: var(--gold); }

    /* Hero */
    .hero-strip {
      padding: 2rem 1.5rem 1rem;
      text-align: center;
      background: linear-gradient(180deg, var(--dark2), transparent);
    }
    .hero-strip h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      color: var(--gold);
      margin-bottom: 0.5rem;
    }
    .hero-strip p { color: var(--muted); font-size: 0.95rem; }

    /* Delivery/Pickup toggle */
    .delivery-toggle {
      display: flex; gap: 0.5rem; justify-content: center;
      margin: 1.5rem auto 2rem; max-width: 420px; padding: 0 1rem;
    }
    .delivery-toggle button {
      flex: 1;
      padding: 0.9rem 1rem;
      border: 2px solid var(--dark3);
      background: var(--dark2);
      color: var(--white);
      font-family: inherit; font-size: 0.95rem; font-weight: 600;
      border-radius: 12px; cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .delivery-toggle button.active {
      background: linear-gradient(135deg, var(--red), var(--red-d));
      border-color: var(--gold);
      box-shadow: 0 4px 16px rgba(198, 40, 40, 0.35);
    }

    /* Container */
    main { max-width: 1100px; margin: 0 auto; padding: 0 1rem; }

    /* Category tabs */
    .cat-tabs {
      display: flex; gap: 0.5rem; overflow-x: auto;
      padding: 0.5rem 0 1rem; margin-bottom: 1rem;
      scrollbar-width: none;
    }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tabs button {
      flex-shrink: 0;
      padding: 0.6rem 1.1rem;
      background: var(--dark2);
      color: var(--white);
      border: 1px solid var(--dark3);
      border-radius: 999px;
      font-family: inherit; font-size: 0.85rem; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cat-tabs button.active {
      background: var(--gold);
      color: var(--dark);
      border-color: var(--gold);
    }

    /* Menu grid */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .item-card {
      background: var(--dark2);
      border: 1px solid var(--dark3);
      border-radius: 14px;
      padding: 1rem;
      transition: transform 0.2s, border-color 0.2s;
    }
    .item-card:hover { transform: translateY(-3px); border-color: var(--gold); }
    .item-name { font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem; }
    .item-desc { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.75rem; min-height: 2.2rem; }
    .item-footer { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
    .item-price { font-size: 1.1rem; font-weight: 800; color: var(--gold); }
    .btn-add {
      padding: 0.55rem 1rem;
      background: linear-gradient(135deg, var(--red), var(--red-d));
      color: var(--white);
      border: none; border-radius: 8px;
      font-family: inherit; font-weight: 600; font-size: 0.85rem;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .btn-add:hover { transform: scale(1.05); }
    .btn-add.in-cart {
      background: var(--green);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .qty-ctrl { display: flex; align-items: center; gap: 0.5rem; }
    .qty-ctrl button {
      width: 28px; height: 28px; border-radius: 6px;
      background: var(--dark3); color: var(--white);
      border: none; cursor: pointer; font-size: 1rem; font-weight: 700;
    }

    /* Cart bar */
    .cart-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: linear-gradient(180deg, var(--dark2), var(--dark));
      border-top: 2px solid var(--gold);
      padding: 1rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
      transform: translateY(110%);
      transition: transform 0.3s;
      z-index: 200;
    }
    .cart-bar.visible { transform: translateY(0); }
    .cart-info { display: flex; flex-direction: column; }
    .cart-info .count { font-size: 0.8rem; color: var(--muted); }
    .cart-info .total { font-size: 1.25rem; font-weight: 800; color: var(--gold); }
    .btn-checkout {
      padding: 0.9rem 1.8rem;
      background: linear-gradient(135deg, var(--red), var(--red-d));
      color: var(--white); border: none; border-radius: 10px;
      font-family: inherit; font-weight: 700; font-size: 1rem;
      cursor: pointer; display: flex; align-items: center; gap: 0.5rem;
      box-shadow: 0 4px 16px rgba(198, 40, 40, 0.4);
    }
    .btn-checkout:hover { filter: brightness(1.1); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: flex-end; justify-content: center;
      z-index: 300;
      padding: 0;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: var(--dark2);
      border-top: 3px solid var(--gold);
      border-radius: 20px 20px 0 0;
      width: 100%; max-width: 560px;
      max-height: 92vh; overflow-y: auto;
      padding: 1.5rem;
      animation: slideUp 0.3s;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; color: var(--gold); margin-bottom: 1rem;
    }
    .modal .close {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none; color: var(--white);
      font-size: 1.4rem; cursor: pointer; opacity: 0.7;
    }

    /* Cart items */
    .cart-items { border-top: 1px solid var(--dark3); padding-top: 1rem; margin-bottom: 1rem; }
    .cart-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--dark3);
      gap: 0.75rem;
    }
    .cart-row .name { flex: 1; font-size: 0.9rem; }
    .cart-row .price { color: var(--gold); font-weight: 700; min-width: 100px; text-align: right; font-size: 0.9rem; }
    .cart-row .qty-ctrl button { width: 26px; height: 26px; }
    .cart-summary { padding: 0.75rem 0; font-size: 0.9rem; }
    .cart-summary .row { display: flex; justify-content: space-between; padding: 0.25rem 0; }
    .cart-summary .row.total { font-size: 1.1rem; font-weight: 800; color: var(--gold); padding-top: 0.5rem; border-top: 1px solid var(--dark3); }

    /* Form */
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.35rem; font-weight: 600; }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 0.75rem 0.9rem;
      background: var(--dark3);
      border: 1px solid #3a3020;
      border-radius: 8px;
      color: var(--white); font-family: inherit; font-size: 0.95rem;
    }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--gold); }
    .form-group textarea { resize: vertical; min-height: 70px; }

    /* Payment box */
    .pay-box {
      background: linear-gradient(135deg, rgba(251,192,45,0.08), rgba(198,40,40,0.08));
      border: 1px solid var(--gold);
      border-radius: 12px;
      padding: 1rem; margin: 1rem 0;
    }
    .pay-box h4 { color: var(--gold); margin-bottom: 0.5rem; font-size: 0.95rem; }
    .pay-box p { font-size: 0.85rem; line-height: 1.5; margin-bottom: 0.4rem; }
    .pay-box .code {
      display: inline-block;
      background: var(--dark3);
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      font-family: monospace;
      font-weight: 700;
      color: var(--gold);
      margin-left: 4px;
    }

    .btn-submit {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--red), var(--red-d));
      color: var(--white); border: none; border-radius: 10px;
      font-family: inherit; font-weight: 700; font-size: 1rem;
      cursor: pointer;
    }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Confirmation */
    .confirm-screen { text-align: center; padding: 1rem; }
    .confirm-icon { font-size: 4rem; margin-bottom: 1rem; }
    .confirm-screen h3 { color: var(--green); margin-bottom: 0.5rem; }
    .confirm-screen .order-num {
      display: inline-block;
      background: var(--dark3);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--gold);
      font-family: monospace;
      margin: 0.5rem 0 1rem;
    }
    .confirm-screen p { color: var(--muted); margin-bottom: 0.75rem; font-size: 0.9rem; }

    /* Toast */
    .toast {
      position: fixed; top: 80px; left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--dark3); color: var(--white);
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      border-left: 4px solid var(--gold);
      opacity: 0;
      transition: all 0.3s;
      z-index: 400;
      font-size: 0.9rem;
    }
    .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { border-left-color: var(--red); }

    .loading { text-align: center; padding: 3rem; color: var(--muted); }

    @media (max-width: 560px) {
      header { padding: 0.8rem 1rem; }
      header .brand-text { font-size: 1rem; }
      .hero-strip { padding: 1.5rem 1rem 0.5rem; }
      .cart-bar { padding: 0.8rem 1rem; }
      .btn-checkout { padding: 0.8rem 1.2rem; font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <img src="ADs_Kitchen_logo_transparent.png" alt="AD's Kitchen" />
    <span class="brand-text">AD's Kitchen</span>
  </div>
  <a href="index.html" class="back"><i class="fa-solid fa-arrow-left"></i> Back to site</a>
</header>

<section class="hero-strip">
  <h1>Order Online</h1>
  <p>Delivery within 10km of Kitooro, Entebbe · Pickup always free</p>
</section>

<div class="delivery-toggle">
  <button id="btn-delivery" class="active" onclick="setDeliveryType('delivery')">
    <i class="fa-solid fa-motorcycle"></i> Delivery
  </button>
  <button id="btn-pickup" onclick="setDeliveryType('pickup')">
    <i class="fa-solid fa-bag-shopping"></i> Pickup
  </button>
</div>

<main>
  <div class="cat-tabs" id="cat-tabs"></div>
  <div id="menu-container">
    <div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Loading menu...</div>
  </div>
</main>

<!-- Floating cart bar -->
<div class="cart-bar" id="cart-bar">
  <div class="cart-info">
    <span class="count" id="cart-count">0 items</span>
    <span class="total" id="cart-total">UGX 0</span>
  </div>
  <button class="btn-checkout" onclick="openCheckout()">
    <i class="fa-solid fa-bag-shopping"></i> Checkout
  </button>
</div>

<!-- Checkout modal -->
<div class="modal-overlay" id="checkout-modal">
  <div class="modal" style="position:relative">
    <button class="close" onclick="closeCheckout()">×</button>
    <div id="checkout-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ===== CONFIG =====
  // Points the frontend at the kitchen API.
  // - Local dev: http://localhost:3000
  // - Production: Railway URL (update PROD_API_BASE below after deploying)
  // Can also be overridden at runtime by setting ?api=https://... in the URL.
  const PROD_API_BASE = 'https://ads-kitchen-production.up.railway.app'; // TODO: replace with real Railway URL after first deploy
  const urlOverride = new URLSearchParams(location.search).get('api');
  const API_BASE = urlOverride
    || ((location.hostname === 'localhost' || location.hostname === '127.0.0.1')
        ? 'http://localhost:3000'
        : PROD_API_BASE);

  let menu = [];         // [{id,name,color,items:[...]}]
  let activeCategory = null;
  let deliveryType = 'delivery';
  const cart = {};       // { menuId: { id, name, price, quantity } }
  let settings = { deliveryFee: 5000, payment: { mtnMomoCode: '382889', airtelMerchantCode: '4382901' } };

  function fmt(n) { return 'UGX ' + Math.round(n || 0).toLocaleString('en-US'); }

  function toast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.toggle('error', !!isError);
    t.classList.add('visible');
    setTimeout(() => t.classList.remove('visible'), 2800);
  }

  async function fetchJSON(path, opts) {
    const r = await fetch(API_BASE + path, opts);
    const json = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(json.error || 'Request failed');
    return json;
  }

  async function loadMenu() {
    try {
      const [m, s] = await Promise.all([
        fetchJSON('/api/public/menu'),
        fetchJSON('/api/public/settings')
      ]);
      menu = m.categories;
      settings = s;
      activeCategory = menu[0] ? menu[0].id : null;
      renderTabs();
      renderMenu();
    } catch (e) {
      document.getElementById('menu-container').innerHTML =
        '<div class="loading" style="color:#ff6b6b">Failed to load menu. Make sure the kitchen API is running.</div>';
    }
  }

  function renderTabs() {
    const tabs = document.getElementById('cat-tabs');
    tabs.innerHTML = menu.map(c =>
      `<button class="${c.id === activeCategory ? 'active' : ''}" onclick="selectCategory('${c.id}')">${c.name}</button>`
    ).join('');
  }

  function selectCategory(id) {
    activeCategory = id;
    renderTabs();
    renderMenu();
  }

  function renderMenu() {
    const container = document.getElementById('menu-container');
    const cat = menu.find(c => c.id === activeCategory);
    if (!cat || cat.items.length === 0) {
      container.innerHTML = '<div class="loading">No items in this category</div>';
      return;
    }
    container.innerHTML = `
      <div class="menu-grid">
        ${cat.items.map(item => renderItemCard(item)).join('')}
      </div>
    `;
  }

  function renderItemCard(item) {
    const inCart = cart[item.id];
    return `
      <div class="item-card">
        <div class="item-name">${item.name}</div>
        <div class="item-desc">${item.description || ''}</div>
        <div class="item-footer">
          <span class="item-price">${fmt(item.price)}</span>
          ${inCart
            ? `<div class="qty-ctrl">
                <button onclick="changeQty('${item.id}', -1)">−</button>
                <span>${inCart.quantity}</span>
                <button onclick="changeQty('${item.id}', 1)">+</button>
              </div>`
            : `<button class="btn-add" onclick="addToCart('${item.id}')">
                <i class="fa-solid fa-plus"></i> Add
              </button>`
          }
        </div>
      </div>
    `;
  }

  function findItem(id) {
    for (const c of menu) {
      const it = c.items.find(i => i.id === id);
      if (it) return it;
    }
    return null;
  }

  function addToCart(id) {
    const it = findItem(id);
    if (!it) return;
    cart[id] = { id, name: it.name, price: it.price, quantity: 1 };
    renderMenu();
    updateCartBar();
    toast(`Added ${it.name}`);
  }

  function changeQty(id, delta) {
    if (!cart[id]) return;
    cart[id].quantity += delta;
    if (cart[id].quantity <= 0) delete cart[id];
    renderMenu();
    updateCartBar();
  }

  function cartSubtotal() {
    return Object.values(cart).reduce((s, i) => s + i.price * i.quantity, 0);
  }
  function cartCount() {
    return Object.values(cart).reduce((s, i) => s + i.quantity, 0);
  }
  function cartDeliveryFee() {
    return deliveryType === 'delivery' ? (settings.deliveryFee || 5000) : 0;
  }

  function updateCartBar() {
    const count = cartCount();
    const total = cartSubtotal() + cartDeliveryFee();
    document.getElementById('cart-count').textContent = count + (count === 1 ? ' item' : ' items');
    document.getElementById('cart-total').textContent = fmt(total);
    document.getElementById('cart-bar').classList.toggle('visible', count > 0);
  }

  function setDeliveryType(type) {
    deliveryType = type;
    document.getElementById('btn-delivery').classList.toggle('active', type === 'delivery');
    document.getElementById('btn-pickup').classList.toggle('active', type === 'pickup');
    updateCartBar();
  }

  function openCheckout() {
    if (cartCount() === 0) return toast('Your cart is empty', true);
    renderCheckout();
    document.getElementById('checkout-modal').classList.add('visible');
  }

  function closeCheckout() {
    document.getElementById('checkout-modal').classList.remove('visible');
  }

  function renderCheckout() {
    const subtotal = cartSubtotal();
    const fee = cartDeliveryFee();
    const total = subtotal + fee;
    const content = document.getElementById('checkout-content');
    content.innerHTML = `
      <h3>Checkout</h3>
      <div class="cart-items">
        ${Object.values(cart).map(i => `
          <div class="cart-row">
            <span class="name">${i.quantity}× ${i.name}</span>
            <span class="price">${fmt(i.price * i.quantity)}</span>
          </div>
        `).join('')}
      </div>
      <div class="cart-summary">
        <div class="row"><span>Subtotal</span><span>${fmt(subtotal)}</span></div>
        ${fee > 0 ? `<div class="row"><span>Delivery fee</span><span>${fmt(fee)}</span></div>` : ''}
        <div class="row total"><span>Total</span><span>${fmt(total)}</span></div>
      </div>

      <div class="form-group">
        <label>Your Name *</label>
        <input type="text" id="co-name" placeholder="e.g. Jane Doe" />
      </div>
      <div class="form-group">
        <label>Phone Number *</label>
        <input type="tel" id="co-phone" placeholder="e.g. 0784 313399" />
      </div>
      ${deliveryType === 'delivery' ? `
        <div class="form-group">
          <label>Delivery Address * (must be within 10km of Kitooro, Entebbe)</label>
          <textarea id="co-address" placeholder="Street, landmark, area..."></textarea>
        </div>
      ` : `
        <div class="form-group">
          <label style="color:var(--gold)"><i class="fa-solid fa-shop"></i> Pickup from Kitooro, Entebbe</label>
        </div>
      `}
      <div class="form-group">
        <label>Notes (optional)</label>
        <textarea id="co-notes" placeholder="Allergies, special requests..."></textarea>
      </div>

      <div class="pay-box">
        <h4><i class="fa-solid fa-mobile-screen-button"></i> Payment</h4>
        <p>After placing your order, pay <b>${fmt(total)}</b> via mobile money:</p>
        <p>MTN MoMo code: <span class="code">${settings.payment.mtnMomoCode}</span></p>
        <p>Airtel Merchant: <span class="code">${settings.payment.airtelMerchantCode}</span></p>
        <p style="margin-top:0.5rem;color:var(--muted)">Use your order number as the reference so we can match the payment.</p>
      </div>

      <button class="btn-submit" id="btn-submit" onclick="submitOrder()">
        <i class="fa-solid fa-paper-plane"></i> Place Order
      </button>
    `;
  }

  async function submitOrder() {
    const name = document.getElementById('co-name').value.trim();
    const phone = document.getElementById('co-phone').value.trim();
    const address = deliveryType === 'delivery' ? document.getElementById('co-address').value.trim() : '';
    const notes = document.getElementById('co-notes').value.trim();

    if (!name) return toast('Please enter your name', true);
    if (!phone || phone.length < 7) return toast('Please enter a valid phone', true);
    if (deliveryType === 'delivery' && !address) return toast('Please enter delivery address', true);

    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Placing order...';

    try {
      const result = await fetchJSON('/api/public/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          customerName: name,
          customerPhone: phone,
          deliveryType,
          deliveryAddress: address,
          notes,
          items: Object.values(cart).map(i => ({ menuId: i.id, name: i.name, quantity: i.quantity }))
        })
      });
      // Clear cart
      Object.keys(cart).forEach(k => delete cart[k]);
      updateCartBar();
      // Confirmation
      document.getElementById('checkout-content').innerHTML = `
        <div class="confirm-screen">
          <div class="confirm-icon">🎉</div>
          <h3>Order Placed!</h3>
          <p>Your order reference:</p>
          <div class="order-num">${result.orderNumber}</div>
          <p>${result.payment.instructions}</p>
          <p style="color:var(--gold);margin-top:1rem"><i class="fa-solid fa-clock"></i> We'll call you shortly on ${phone}</p>
          <button class="btn-submit" style="margin-top:1rem" onclick="closeCheckout(); location.reload()">Done</button>
        </div>
      `;
    } catch (e) {
      toast(e.message || 'Failed to place order', true);
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Place Order';
    }
  }

  // Init
  loadMenu();
</script>
</body>
</html>
